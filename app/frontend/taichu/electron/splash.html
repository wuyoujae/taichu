<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taichu 正在启动</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #09090b;
        --muted: #71717a;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--fg);
      }

      .loading {
        text-align: center;
        width: 220px;
      }

      .dot {
        width: 36px;
        height: 36px;
        margin: 0 auto 12px;
        border: 3px solid #e4e4e7;
        border-top-color: #18181b;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .text {
        font-size: 14px;
        color: var(--muted);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="loading">
      <div class="dot"></div>
      <div class="text">Taichu 正在加载界面...</div>
    </div>
  </body>
</html>
