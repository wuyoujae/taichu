<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olympus AI - Message Components</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* === 核心 CSS 变量 === */
        :root {
            --background: #ffffff;
            --foreground: #09090b;
            --muted: #f4f4f5;
            --muted-foreground: #71717a;
            --border: #e4e4e7;
            --input: #e4e4e7;
            --primary: #18181b;
            --primary-foreground: #fafafa;

            /* 语义化颜色 (仅用于点缀) */
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;

            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --font-sans: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: #fafafa;
            color: var(--foreground);
            min-height: 100vh;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        button {
            border: none;
            background: none;
            cursor: pointer;
            font-family: inherit;
        }

        /* === 演示页面样式 (非组件核心) === */
        .demo-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--background);
            padding: 2rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .demo-section {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: 1.125rem;
            margin-bottom: 1rem;
            color: var(--muted-foreground);
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-default {
            background: var(--background);
            border: 1px solid var(--border);
            color: var(--foreground);
            box-shadow: var(--shadow-sm);
        }

        .btn-default:hover {
            background: var(--muted);
        }

        .btn-primary {
            background: var(--foreground);
            color: var(--background);
            border: 1px solid var(--foreground);
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }

        .btn-danger:hover {
            opacity: 0.9;
        }

        /* =========================================
           以下是组件核心 CSS
           ========================================= */

        /* --- 1. Toast / Notice 系统 --- */
        #olympus-toast-container {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            pointer-events: none;
        }

        .o-toast {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            padding: 1rem;
            width: 350px;
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            pointer-events: auto;
            position: relative;
            overflow: hidden;
            /* 动画初始状态 */
            opacity: 0;
            transform: translateX(100%) scale(0.95);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .o-toast.show {
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        .o-toast.hide {
            opacity: 0;
            transform: scale(0.95);
            margin-top: -80px;
            /* 收缩高度效果 */
        }

        .o-toast-icon {
            flex-shrink: 0;
            margin-top: 2px;
        }

        .o-toast-icon.success {
            color: var(--success);
        }

        .o-toast-icon.warning {
            color: var(--warning);
        }

        .o-toast-icon.error {
            color: var(--error);
        }

        .o-toast-icon.info {
            color: var(--info);
        }

        .o-toast-content {
            flex: 1;
        }

        .o-toast-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--foreground);
            margin-bottom: 0.25rem;
        }

        .o-toast-desc {
            font-size: 0.875rem;
            color: var(--muted-foreground);
            line-height: 1.4;
        }

        .o-toast-close {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            color: var(--muted-foreground);
            padding: 0.25rem;
            border-radius: 4px;
            transition: background 0.2s, color 0.2s;
        }

        .o-toast-close:hover {
            background: var(--muted);
            color: var(--foreground);
        }

        /* --- 2. Modal 系统 (Confirm & Prompt) --- */
        .o-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .o-modal-overlay.show {
            opacity: 1;
        }

        .o-modal-box {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
            transform: scale(0.95) translateY(10px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .o-modal-overlay.show .o-modal-box {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .o-modal-header {
            margin-bottom: 1.5rem;
        }

        .o-modal-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--foreground);
            margin-bottom: 0.5rem;
        }

        .o-modal-desc {
            font-size: 0.875rem;
            color: var(--muted-foreground);
            line-height: 1.5;
        }

        .o-modal-body {
            margin-bottom: 1.5rem;
        }

        .o-modal-input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            border: 1px solid var(--input);
            border-radius: var(--radius-md);
            background: transparent;
            color: var(--foreground);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .o-modal-input:focus {
            border-color: #a1a1aa;
            box-shadow: 0 0 0 1px #a1a1aa;
        }

        .o-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }
    </style>
</head>

<body>

    <div class="demo-container">
        <h1>Olympus UI Components</h1>
        <p style="color: var(--muted-foreground); margin-bottom: 2rem;">World-class notification and dialog system.</p>

        <div class="demo-section">
            <h2>1. Notices / Toasts (右上角)</h2>
            <div class="btn-group">
                <button class="btn btn-default"
                    onclick="Olympus.success('Agent saved', 'Your changes have been successfully deployed.')">
                    <i data-lucide="check-circle-2" size="16" style="color: var(--success)"></i> Success
                </button>
                <button class="btn btn-default"
                    onclick="Olympus.info('Update available', 'A new version of GPT-4 is available.')">
                    <i data-lucide="info" size="16" style="color: var(--info)"></i> Info
                </button>
                <button class="btn btn-default"
                    onclick="Olympus.warn('API limit reaching', 'You have used 90% of your monthly credits.')">
                    <i data-lucide="alert-triangle" size="16" style="color: var(--warning)"></i> Warning
                </button>
                <button class="btn btn-default"
                    onclick="Olympus.error('Deployment failed', 'Invalid API Key provided for Anthropic endpoint.')">
                    <i data-lucide="x-circle" size="16" style="color: var(--error)"></i> Error
                </button>
            </div>
        </div>

        <div class="demo-section">
            <h2>2. Confirm Dialogs (异步 Promise 阻塞)</h2>
            <div class="btn-group">
                <button class="btn btn-default" onclick="runDemoConfirm()">
                    <i data-lucide="trash-2" size="16"></i> Standard Confirm
                </button>
                <button class="btn btn-default" onclick="runDemoDestructive()">
                    <i data-lucide="alert-octagon" size="16" style="color: var(--error)"></i> Destructive Action
                </button>
            </div>
            <p id="confirmResult"
                style="margin-top: 1rem; font-size: 0.875rem; font-family: monospace; color: var(--info);"></p>
        </div>

        <div class="demo-section" style="border-bottom: none;">
            <h2>3. Input / Prompt Dialogs</h2>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="runDemoPrompt()">
                    <i data-lucide="folder-plus" size="16"></i> Create New Folder
                </button>
            </div>
            <p id="promptResult"
                style="margin-top: 1rem; font-size: 0.875rem; font-family: monospace; color: var(--info);"></p>
        </div>
    </div>

    <!-- =========================================
         核心 JavaScript 逻辑 (Olympus 命名空间)
         ========================================= -->
    <script>
        lucide.createIcons();

        const Olympus = (function () {
            // --- Toast 初始化 ---
            let toastContainer = document.getElementById('olympus-toast-container');
            if (!toastContainer) {
                toastContainer = document.createElement('div');
                toastContainer.id = 'olympus-toast-container';
                document.body.appendChild(toastContainer);
            }

            const iconsMap = {
                'success': 'check-circle-2',
                'info': 'info',
                'warn': 'alert-triangle',
                'error': 'x-circle'
            };

            // 内部生成 Toast 的方法
            function createToast(type, title, desc, duration = 4000) {
                const toast = document.createElement('div');
                toast.className = 'o-toast';

                const iconName = iconsMap[type];

                toast.innerHTML = `
                    <i data-lucide="${iconName}" size="20" class="o-toast-icon ${type}"></i>
                    <div class="o-toast-content">
                        <div class="o-toast-title">${title}</div>
                        ${desc ? `<div class="o-toast-desc">${desc}</div>` : ''}
                    </div>
                    <button class="o-toast-close"><i data-lucide="x" size="16"></i></button>
                `;

                toastContainer.appendChild(toast);
                lucide.createIcons({ root: toast });

                // 强制重绘以触发动画
                toast.offsetHeight;
                toast.classList.add('show');

                const closeBtn = toast.querySelector('.o-toast-close');
                let timeoutId;

                const removeToast = () => {
                    toast.classList.remove('show');
                    toast.classList.add('hide');
                    setTimeout(() => toast.remove(), 300); // 等待 CSS 动画结束
                };

                closeBtn.addEventListener('click', () => {
                    clearTimeout(timeoutId);
                    removeToast();
                });

                if (duration > 0) {
                    timeoutId = setTimeout(removeToast, duration);
                }
            }

            // 内部生成 Modal 的方法 (返回 Promise)
            function createModal(options) {
                return new Promise((resolve) => {
                    const overlay = document.createElement('div');
                    overlay.className = 'o-modal-overlay';

                    const isPrompt = options.type === 'prompt';
                    const confirmBtnClass = options.destructive ? 'btn-danger' : 'btn-primary';

                    overlay.innerHTML = `
                        <div class="o-modal-box">
                            <div class="o-modal-header">
                                <h3 class="o-modal-title">${options.title}</h3>
                                ${options.desc ? `<p class="o-modal-desc">${options.desc}</p>` : ''}
                            </div>
                            ${isPrompt ? `
                            <div class="o-modal-body">
                                <input type="text" class="o-modal-input" placeholder="${options.placeholder || ''}" value="${options.defaultValue || ''}">
                            </div>
                            ` : ''}
                            <div class="o-modal-footer">
                                <button class="btn btn-default" id="o-modal-cancel">${options.cancelText || 'Cancel'}</button>
                                <button class="btn ${confirmBtnClass}" id="o-modal-confirm">${options.confirmText || 'Confirm'}</button>
                            </div>
                        </div>
                    `;

                    document.body.appendChild(overlay);

                    // 触发动画
                    overlay.offsetHeight;
                    overlay.classList.add('show');

                    const inputEl = overlay.querySelector('.o-modal-input');
                    const btnCancel = overlay.querySelector('#o-modal-cancel');
                    const btnConfirm = overlay.querySelector('#o-modal-confirm');

                    if (isPrompt && inputEl) {
                        inputEl.focus();
                        // 允许回车确认
                        inputEl.addEventListener('keyup', (e) => {
                            if (e.key === 'Enter') btnConfirm.click();
                        });
                    }

                    const closeAndResolve = (result) => {
                        overlay.classList.remove('show');
                        setTimeout(() => overlay.remove(), 200); // 配合 0.2s 过渡
                        resolve(result);
                    };

                    btnCancel.addEventListener('click', () => closeAndResolve(isPrompt ? null : false));
                    btnConfirm.addEventListener('click', () => {
                        closeAndResolve(isPrompt ? inputEl.value : true);
                    });
                });
            }

            // 暴露的公共 API
            return {
                // Toasts
                success: (title, desc) => createToast('success', title, desc),
                info: (title, desc) => createToast('info', title, desc),
                warn: (title, desc) => createToast('warn', title, desc),
                error: (title, desc) => createToast('error', title, desc),

                // Dialogs
                confirm: (options) => createModal({ type: 'confirm', ...options }),
                prompt: (options) => createModal({ type: 'prompt', ...options })
            };
        })();

        // =========================================
        // 演示代码：展示如何在业务中优雅地调用
        // =========================================

        async function runDemoConfirm() {
            const result = await Olympus.confirm({
                title: "Restart Agent?",
                desc: "This will clear the current conversation memory. Are you sure you want to continue?",
                confirmText: "Restart"
            });

            document.getElementById('confirmResult').innerText = `Result: ${result}`;
            if (result) Olympus.success("Agent restarted");
        }

        async function runDemoDestructive() {
            const result = await Olympus.confirm({
                title: "Delete 'Senior Copywriter'?",
                desc: "This action cannot be undone. This agent will be permanently removed from your workspace.",
                confirmText: "Delete",
                destructive: true // 红色按钮
            });

            document.getElementById('confirmResult').innerText = `Result: ${result}`;
            if (result) Olympus.error("Deleted", "Agent has been removed.");
        }

        async function runDemoPrompt() {
            const folderName = await Olympus.prompt({
                title: "New Folder",
                desc: "Enter a name for your new agent group.",
                placeholder: "e.g. Marketing Team",
                confirmText: "Create"
            });

            document.getElementById('promptResult').innerText = `Result: ${folderName !== null ? `"${folderName}"` : 'null (cancelled)'}`;

            if (folderName) {
                Olympus.success("Folder created", `Folder "${folderName}" has been successfully created.`);
            }
        }
    </script>
</body>

</html>
